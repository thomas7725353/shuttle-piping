name: Build Linux Binaries

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --locked

      - name: Build binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/axum-piping dist/axum-piping-linux-${{ matrix.arch }}
          chmod +x dist/axum-piping-linux-${{ matrix.arch }}

      - name: Verify embedded frontend assets
        run: |
          strings dist/axum-piping-linux-${{ matrix.arch }} | grep -q "<!doctype html>"
          strings dist/axum-piping-linux-${{ matrix.arch }} | grep -q "/assets/index-"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axum-piping-linux-${{ matrix.arch }}
          path: dist/axum-piping-linux-${{ matrix.arch }}
          if-no-files-found: error
