apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shuttle-piping
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/thomas7725353/shuttle-piping.git
    targetRevision: main
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: shuttle-piping
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
